<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Suhu</title>
    <style>
body { 
    font-family: sans-serif; 
    padding: 20px; 
}
.input { 
    margin-bottom: 10px; 
}
.input { 
    display: flex;
    padding: 8px; 
    font-size: 16px; 
}
.result { 
    display: flex;
    margin-top: 15px; 
    font-size: 18px; 
    font-weight: bold; 
}
.konversi {
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.konversi > span {
    display: flex;
    font-weight: bold;
}
.result {
    display: flex;
    flex-direction: column;
}
.result > table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
table > thead > tr {
    border: 1px solid;
}
    </style>
</head>
<body>
    <div class="konversi">
        <span>Program Konversi Suhu</span>
        <form id="input">
            <input type="number" id="celcius" placeholder="Masukkan Celcius" name="valueCelcius">
            <button type="submit" id="convertBtn">Konversi</button>
        </form>
        <div class="result">
            <table>
                <thead>
                    <tr>
                        <th>Celcius</th>
                        <th>fahrenheit</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="inCelcius">25</td>
                        <td>27</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const boxHistory = document.querySelector("tbody")
        const divResult = document.querySelector('.result');
        const form = document.getElementById("input")
        form.addEventListener("submit", (e) => {
            e.preventDefault()
            const data = new FormData(e.target)
            const value = data.get("valueCelcius")
            console.log(value)
            const celcius = Number(value);
            
            if (isNaN(celcius)) {
                divResult.textContent = 'Silakan masukkan angka yang valid.';
                return;
            }

            const fahrenheit = (celcius * 9/5) + 32;
            const history = document.createElement("tr")
            const inCc = document.createElement("td")
            const inFr = document.createElement("td")
            inCc.textContent = value
            inFr.textContent =fahrenheit
            history.appendChild(inCc)
            history.appendChild(inFr)
            boxHistory.appendChild(history)
            // divResult.textContent = `${celcius}°C = ${fahrenheit}°F`;
        })
    </script>
</body>
</html>
